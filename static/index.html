<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白象棋</title>
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --header-bg: #fff;
            --header-border: #000;
            --board-line: #333;
            --river-text: #000;
            --piece-red-bg: #fff;
            --piece-red-text: #000;
            --piece-red-border: #000;
            --piece-black-bg: #000;
            --piece-black-text: #fff;
            --piece-black-border: #000;
            --card-bg: #fff;
            --card-shadow: rgba(0, 0, 0, 0.1);
            --input-bg: #fafafa;
            --btn-bg: #222;
            --btn-text: #fff;
            --modal-bg: rgba(0, 0, 0, 0.45);
        }

        .dark-mode {
            --bg: #0a0a0a;
            --text: #eee;
            --header-bg: #111;
            --header-border: #333;
            --board-line: #444;
            --river-text: #888;
            --piece-red-bg: #ddd;
            --piece-red-text: #000;
            --piece-red-border: #444;
            --piece-black-bg: #1a1a1a;
            --piece-black-text: #ddd;
            --piece-black-border: #444;
            --card-bg: #1a1a1a;
            --card-shadow: rgba(0, 0, 0, 0.5);
            --input-bg: #222;
            --btn-bg: #444;
            --btn-text: #eee;
            --modal-bg: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @media screen and (max-width: 500px) {
            body {
                padding: 10px 4px;
            }

            .header {
                padding: 4px 8px;
            }

            .home {
                padding: 24px 16px;
                width: 95%;
            }

            h1 {
                margin-bottom: 15px;
            }
        }

        h1 {
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 20px;
            color: var(--text);
            font-size: clamp(16px, 4vw, 28px);
        }

        /* 首页 */
        .home {
            text-align: center;
            margin-top: 50px;
            background: var(--card-bg);
            padding: 40px 60px;
            border-radius: 8px;
            box-shadow: 0 4px 20px var(--card-shadow);
        }

        .home input {
            background: var(--input-bg);
            border: 1px solid var(--board-line);
            color: var(--text);
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            width: 200px;
        }

        .home button {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            border-radius: 4px;
        }

        .home button:hover {
            opacity: 0.9;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 2px solid var(--header-border);
            margin-bottom: 12px;
            gap: 15px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            flex-shrink: 0;
            padding-right: 12px;
            border-right: 1px solid var(--header-border);
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex: 1;
            max-width: 350px;
        }

        .battle-row {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .vs-silo {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
        }

        .player-hp-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .player-hp-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            color: var(--text);
        }

        /* 状态工具行 */
        .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            gap: 8px;
            padding-top: 4px;
            border-top: 1px dashed var(--header-border);
        }

        .meta-left {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 50%;
        }

        .meta-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 棋盘 — 响应式，vmin 自适应 */
        .game {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        #board {
            position: relative;
        }

        .line {
            position: absolute;
            background: var(--board-line);
            z-index: 1;
            pointer-events: none;
            transform: none;
            display: block;
        }

        .svg-board {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 90;
        }

        .river {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-weight: bold;
            color: var(--river-text);
            z-index: 0;
            pointer-events: none;
            left: 0;
            right: 0;
        }

        .cell {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            box-sizing: border-box;
            font-family: 'KaiTi', 'STKaiti', 'SimSun', serif;
            font-weight: bold;
        }

        .cell.red {
            background: var(--piece-red-bg);
            color: var(--piece-red-text);
            border: 2px solid var(--piece-red-border);
        }

        .cell.black {
            background: var(--piece-black-bg);
            color: var(--piece-black-text);
            border: 2px solid var(--piece-black-border);
        }

        .cell.red.selected {
            border: 4px solid var(--text);
            outline: 2px solid var(--bg);
        }

        .cell.black.selected {
            border: 4px solid var(--piece-black-text);
            outline: 2px solid var(--piece-black-bg);
        }

        .cell.valid-move {
            border: 2px dashed var(--board-line);
            background: rgba(128, 128, 128, 0.1);
        }

        .cell.empty {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .undo-btn {
            padding: 5px 14px;
            font-size: 13px;
            background: #555;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .undo-btn:hover:not(:disabled) {
            background: #333;
        }

        .undo-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #undoBar {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 999;
            gap: 10px;
            align-items: center;
        }

        #undoBar button {
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        #undoBar .accept {
            background: #fff;
            color: #000;
        }

        #undoBar .decline {
            background: #555;
            color: #fff;
        }

        .info {
            font-size: 13px;
            padding: 4px 10px;
            background: var(--piece-red-bg);
            border: 2px solid var(--header-border);
            color: var(--text);
            border-radius: 4px;
            font-weight: bold;
        }

        .info.red-turn {
            color: #000;
            border-style: dotted;
            /* Distinct border for red turn on E-ink */
        }

        .info.black-turn {
            color: #000;
            border-style: solid;
        }

        .room-code {
            margin: 10px 0;
            font-size: 15px;
            color: var(--text);
        }

        .room-code span {
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--text);
        }

        .room-code-clickable {
            cursor: pointer;
            user-select: none;
        }

        .room-code-clickable:active {
            opacity: 0.75;
        }

        /* 对局内提示（首页隐藏后仍可见） */
        #gameToast {
            display: none;
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2500;
            max-width: min(92vw, 420px);
            padding: 12px 18px;
            background: #111;
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.45;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.22);
            text-align: center;
            pointer-events: none;
        }

        #gameToast.visible {
            display: block;
        }

        .modal-card {
            max-width: 320px;
            border-radius: 12px;
            padding: 28px 24px;
        }

        /* 墨水屏血条样式 */
        .health-container {
            height: 10px;
            border: 2px solid var(--text);
            background: var(--card-bg);
            margin-top: 4px;
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            background: var(--text);
            float: left;
            transition: width 0.3s ease;
        }

        /* 墨水屏网纹效果 */
        .health-bar-danger {
            height: 100%;
            background: repeating-linear-gradient(45deg,
                    var(--card-bg),
                    var(--card-bg) 2px,
                    var(--text) 2px,
                    var(--text) 4px);
            float: left;
            transition: width 0.3s ease;
        }

        .health-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: bold;
            color: var(--text);
            margin-top: 8px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--river-text);
            line-height: 1.5;
            margin-bottom: 22px;
        }

        .modal-victory-text {
            font-size: 15px;
            line-height: 1.55;
            margin-bottom: 22px;
            color: var(--text);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal .btn-ghost {
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--header-border);
        }

        .modal .btn-danger {
            background: #b00020;
        }

        .modal .btn-danger:hover {
            background: #8c001a;
        }

        /* 加入房间弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--modal-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 4000;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .lobby {
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
            text-align: left;
        }

        .lobby-title {
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid var(--header-border);
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: var(--text);
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid var(--header-border);
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            background: var(--card-bg);
            color: var(--text);
        }

        .room-item:hover {
            opacity: 0.8;
        }

        .room-item .rn {
            font-weight: bold;
        }

        .room-item .own {
            font-size: 12px;
            color: var(--river-text);
        }

        .modal-content {
            background: var(--card-bg);
            color: var(--text);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .modal input {
            background: var(--input-bg);
            border: 1px solid var(--header-border);
            color: var(--text);
            padding: 10px;
            font-size: 18px;
            width: 150px;
            text-align: center;
            letter-spacing: 4px;
        }

        .modal button {
            background: #222;
            color: #fff;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            margin: 10px 5px;
            border-radius: 4px;
        }

        .level-btn {
            background: #fff !important;
            color: #222 !important;
            border: 2px solid #222 !important;
            padding: 6px 12px !important;
            font-size: 14px !important;
            min-width: 40px;
        }

        .level-btn.active {
            background: #222 !important;
            color: #fff !important;
        }

        .replay-btn-exit {
            background: #b00020 !important;
            color: #fff !important;
            border-color: #8c001a !important;
            margin-left: auto;
        }

        .replay-bar {
            display: none;
            justify-content: center;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px dashed var(--header-border);
            margin-top: 5px;
            width: 100%;
        }

        .replay-bar button {
            background: var(--input-bg);
            color: var(--text);
            border: none;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        .replay-bar button:active {
            filter: invert(1);
        }

        .header-icon {
            cursor: pointer;
            opacity: 0.7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: opacity 0.2s;
            color: var(--text);
        }

        .header-icon:hover {
            opacity: 1;
        }


        .history-item {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-bottom: 1px solid var(--header-border);
            text-align: left;
            cursor: pointer;
        }

        .history-item:hover {
            background: var(--input-bg);
        }

        .history-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 16px;
            opacity: 0.4;
            cursor: pointer;
            z-index: 5;
            padding: 4px;
        }

        .history-delete:hover {
            opacity: 1;
            color: #b00020;
        }

        .history-meta {
            font-size: 11px;
            color: var(--river-text);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div style="font-size: 16px; font-weight: bold; letter-spacing: 1px;">黑白森林</div>
            <div style="display: flex; gap: 8px;">
                <div id="historyBtn" class="header-icon" onclick="openHistory()" title="历史棋谱">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                </div>
                <div id="themeToggle" class="header-icon" onclick="toggleTheme()" title="切换主题">
                    <!-- SVG injected by JS -->
                </div>
            </div>
        </div>

        <div class="header-right" id="headerContent" style="display:none;">
            <!-- Row 1: Player Battle Status (Health Bars) -->
            <div id="battleRow" class="battle-row">
                <div class="player-hp-block">
                    <div class="player-hp-meta">
                        <div id="siloRed" class="vs-silo"></div>
                        <span id="nameRed"
                            style="flex: 1; text-align: left; margin-left: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                        <span id="checkRed" style="display:none; margin-right:4px;">🗡️</span>
                        <span id="scoreRed">100%</span>
                    </div>
                    <div class="health-container">
                        <div id="healthRedBar" class="health-bar-fill"></div>
                        <div id="healthRedDanger" class="health-bar-danger" style="width: 0%;"></div>
                    </div>
                </div>
                <div style="font-size: 10px; font-weight: bold; opacity: 0.6; margin: 0 4px;">VS</div>
                <div class="player-hp-block">
                    <div class="player-hp-meta">
                        <span id="scoreBlack">100%</span>
                        <span id="checkBlack" style="display:none; margin-left:4px;">🗡️</span>
                        <span id="nameBlack"
                            style="flex: 1; text-align: right; margin-right: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                        <div id="siloBlack" class="vs-silo"></div>
                    </div>
                    <div class="health-container">
                        <div id="healthBlackBar" class="health-bar-fill" style="float:right;"></div>
                        <div id="healthBlackDanger" class="health-bar-danger" style="float:right; width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Row 2: Room Metadata & Actions -->
            <div id="metaRow" class="meta-row">
                <div id="roomMetaInfo" class="meta-left">
                    <div id="roomNameDisplay"
                        style="font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    </div>
                    <div id="roomCodeDisplay" onclick="copyRoomCode()"
                        style="background:var(--input-bg); padding:1px 6px; border-radius:3px; cursor:pointer; white-space: nowrap;">
                        码:<span id="roomCodeText"></span>
                    </div>
                </div>
                <div class="meta-right">
                    <div id="turnInfo" class="info" style="padding: 2px 8px;"></div>
                    <button class="undo-btn" id="undoBtn" onclick="undoMove()">悔</button>
                    <button class="undo-btn" id="saveBtn" onclick="saveGame()"
                        style="display:none; background:#2e7d32;">存</button>
                    <button class="undo-btn" id="leaveBtn" onclick="leaveRoom()" style="background:#444;">离</button>
                </div>
            </div>
            <!-- Row 3: Replay Navigation -->
            <div id="replayBar" class="replay-bar">
                <button onclick="replayFirst()">&lt;&lt;</button>
                <button onclick="replayPrev()">&lt;</button>
                <button id="replayCounter"
                    style="border:none; background:none; font-weight:bold; min-width:60px;"></button>
                <button onclick="replayNext()">&gt;</button>
                <button onclick="replayLast()">&gt;&gt;</button>
                <button id="autoPlayBtn" onclick="toggleAutoPlay()"
                    style="min-width:40px; font-weight:bold; margin-left:8px;">&lt;&gt;</button>
                <button class="replay-btn-exit" onclick="leaveRoom()" style="border:none;">离</button>
            </div>
        </div>
    </header>

    <div id="undoBar">
        <span id="undoBarText"></span>
        <button class="accept" onclick="acceptUndo()">接受</button>
        <button class="decline" onclick="declineUndo()">拒绝</button>
    </div>

    <div class="home" id="homePage" style="position:relative;">
        <div id="feedback" style="margin-bottom:15px;min-height:24px;color:#000;"></div>
        <div class="nickname-container"
            style="margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 4px;">
            <div id="silhouetteContainer" style="
                width: 44px; 
                height: 44px; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                flex-shrink: 0;
            ">
                <!-- Silhouette Icon -->
            </div>
            <div style="position: relative; display: flex; align-items: center;">
                <input id="nicknameInput" type="text" maxlength="10" placeholder="您的昵称" oninput="updateSilhouette()"
                    onkeyup="if(event.key==='Enter') createRoom()"
                    style="text-align:center; font-weight: bold; width: 140px; height: 44px; margin: 0; border-radius: 4px;">
                <div id="refreshNickBtn" onclick="refreshRandomNick()" class="header-icon" style="margin-left: 4px;"
                    title="换一个人物">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </div>
            </div>
        </div>
        <button onclick="createRoom()"
            style="min-width: 200px; height: 44px; font-weight: bold; border: 2px solid #000;">开局对弈</button>

        <div class="ai-section" style="margin-top:30px; border-top:2px solid var(--header-border); padding-top:20px;">
            <p style="font-size:14px; font-weight:bold; margin-bottom:12px;">AI陪练</p>
            <div style="margin-bottom: 20px;">
                <select id="aiLevelSelect" onchange="setAiLevel(this.value)" style="
                    background: var(--input-bg);
                    color: var(--text);
                    border: 1px solid var(--header-border);
                    padding: 8px 16px;
                    font-size: 15px;
                    border-radius: 6px;
                    width: 100%;
                    max-width: 200px;
                    cursor: pointer;
                    outline: none;
                ">
                    <option value="1">初学乍练</option>
                    <option value="4">略有小成</option>
                    <option value="7" selected>炉火纯青</option>
                    <option value="10">出神入化</option>
                    <option value="13">天人合一</option>
                </select>
            </div>
            <button onclick="createAiRoom()" style="background:#555;">挑战AI</button>
        </div>

        <div class="lobby" id="lobbyContainer" style="display:none;">
            <div class="lobby-title">可加入的对局</div>
            <div id="roomList"></div>
        </div>
    </div>

    <div id="joinModal" class="modal">
        <div class="modal-content">
            <p>输入房间码</p>
            <br>
            <input id="roomCodeInput" maxlength="4" placeholder="如 1234" onkeyup="if(event.key==='Enter') joinRoom()">
            <br><br>

            const spears = ["赵云", "张飞", "林冲", "杨志", "史进", "阮小七", "如来", "张辽", "太史慈", "杨过"];
            const axes = ["李逵", "徐晃", "程咬金", "潘凤", "柴进"];
            const hammers = ["李元霸", "岳云", "牛魔王", "金角", "银角"];
            const mace = ["秦明", "雷横", "狼牙棒", "黄眉", "黑熊"];
            const fists = ["武松", "鲁智深", "乔峰", "郭靖", "张无忌", "洪七公", "周伯通", "虚竹", "燕青", "许褚", "典韦", "拳"];
            const archery = ["花荣", "黄忠", "庞德", "张清", "弓", "箭"];
            const rake = ["猪八戒", "沙僧", "钉耙"];
            const horses = ["牵马", "白龙马", "二郎神", "呼延灼", "慕容复", "段誉", "马"];

            // Gender/Appearance based
            const females = ["甄宓", "貂蝉", "孙二娘", "顾大嫂", "黄蓉", "赵敏", "周芷若", "王语嫣", "任盈盈", "铁扇公主", "观音菩萨", "玉兔精", "白骨精", "灭绝师太"];
            const twins = ["小龙女", "双儿", "程灵素", "孩", "哪吒", "红孩儿", "韦小宝", "时迁", "龙女"];

            if (handgun.some(h => name.includes(h))) return "handgun";
            if (rifle.some(r => name.includes(r))) return "rifle";
            if (sniper.some(s => name.includes(s))) return "sniper";
            if (guandao.some(g => name.includes(g))) return "guandao";
            if (mace.some(m => name.includes(m))) return "mace";
            if (nunchucks.some(n => name.includes(n))) return "nunchucks";
            if (archery.some(a => name.includes(a))) return "archery";
            if (halberd.some(h => name.includes(h))) return "halberd";
            if (rake.some(r => name.includes(r))) return "rake";
            if (fists.some(f => name.includes(f))) return "fist";
            if (scholars.some(s => name.includes(s))) return "scholar";
            if (axes.some(a => name.includes(a))) return "axe";
            if (hammers.some(h => name.includes(h))) return "hammer";
            if (twins.some(t => name.includes(t))) return "twintails";
            if (females.some(f => name.includes(f) || name.includes("娘") || name.includes("嫂") || name.includes("公主"))) return "lady";
            if (horses.some(m => name.includes(m))) return "leader";
            if (spears.some(s => name.includes(s))) return "spear";
            return "warrior";
        }

            var wn = w === 'red' ? window.redName : window.blackName;

            if (victoryAnnounced) return;

                    line = buildVictoryFallback(dataWinner);

            openVictoryModal(line);

        function applyReplayStep() {
            // Reconstruct board from moves up to replayIndex
            var newBoard = [
                ['R1', 'N1', 'B1', 'A1', 'K', 'A2', 'B2', 'N2', 'R2'],
                [null, null, null, null, null, null, null, null, null],
                [null, 'C1', null, null, null, null, null, 'C2', null],
                ['P1', null, 'P2', null, 'P3', null, 'P4', null, 'P5'],
                [null, null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null, null],
                ['p1', null, 'p2', null, 'p3', null, 'p4', null, 'p5'],
                [null, 'c1', null, null, null, null, null, 'c2', null],
                [null, null, null, null, null, null, null, null, null],
                ['r1', 'n1', 'b1', 'a1', 'k', 'a2', 'b2', 'n2', 'r2']
            ];

            for (var i = 0; i < replayIndex; i++) {
                var m = replayMoves[i];
                newBoard[m.to_y][m.to_x] = m.piece;
                newBoard[m.from_y][m.from_x] = null;
            }

            board = newBoard;
            lastMove = replayIndex > 0 ? replayMoves[replayIndex - 1] : null;

            // Current Turn logic for replay? Usually not needed but let's estimate
            currentTurn = (replayIndex % 2 === 0) ? 'red' : 'black';

            // Show step counter
            document.getElementById('replayCounter').textContent = replayIndex + ' / ' + replayMoves.length;

            renderBoard();
            updateHealthDisplay();
            updateTurnInfo();
        }

        var autoPlayInterval = null;
        function toggleAutoPlay() {
            var btn = document.getElementById('autoPlayBtn');
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
                btn.textContent = '<>';
            } else {
                if (replayIndex >= replayMoves.length) replayIndex = 0;
                btn.textContent = '||';
                autoPlayInterval = setInterval(function () {
                    if (replayIndex < replayMoves.length) {
                        replayIndex++;
                        applyReplayStep();
                    } else {
                        toggleAutoPlay();
                    }
                }, 1000);
                applyReplayStep();
            }
        }

        function stopAutoPlay() {
            if (autoPlayInterval) toggleAutoPlay();
        }

        function replayFirst() { stopAutoPlay(); replayIndex = 0; applyReplayStep(); }
        function replayLast() { stopAutoPlay(); replayIndex = replayMoves.length; applyReplayStep(); }
        function replayPrev() { stopAutoPlay(); if (replayIndex > 0) { replayIndex--; applyReplayStep(); } }
        function replayNext() { stopAutoPlay(); if (replayIndex < replayMoves.length) { replayIndex++; applyReplayStep(); } }

        function renderBoard() {
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            // Compute cell size from viewport — single source of truth
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            // Optimized cell size: more aggressive on mobile to maximize play area
            var cellFactor = vw < 500 ? 0.108 : 0.095;
            var cell = Math.floor(Math.min(vh * 0.082, vw * cellFactor));
            var pieceSize = Math.floor(cell * 0.85);

            // Board spans 8 cells wide (9 intersections) × 9 cells tall (10 intersections)
            var boardW = cell * 8;
            var boardH = cell * 9;

            // The wrapper adds padding so edge pieces aren't clipped
            var pad = Math.ceil(pieceSize / 2) + 4;
            var wrapper = document.getElementById('boardWrapper');
            wrapper.style.padding = pad + 'px';

            boardEl.style.width = boardW + 'px';
            boardEl.style.height = boardH + 'px';

            // --- Draw horizontal lines (10 rows: y=0..9) ---
            for (var i = 0; i < 10; i++) {
                var line = document.createElement('div');
                line.className = 'line';
                line.style.height = '1px';
                line.style.width = boardW + 'px';
                line.style.left = '0';
                line.style.top = (i * cell) + 'px';
                boardEl.appendChild(line);
            }

            // --- Draw vertical lines (9 cols: x=0..8), broken at river ---
            for (var i = 0; i < 9; i++) {
                var xCoord = i * cell;
                if (i === 0 || i === 8) {
                    var line = document.createElement('div');
                    line.className = 'line';
                    line.style.width = '1px';
                    line.style.height = boardH + 'px';
                    line.style.left = xCoord + 'px';
                    line.style.top = '0';
                    boardEl.appendChild(line);
                } else {
                    var topLine = document.createElement('div');
                    topLine.className = 'line';
                    topLine.style.width = '1px';
                    topLine.style.height = (cell * 4) + 'px';
                    topLine.style.left = xCoord + 'px';
                    topLine.style.top = '0';
                    boardEl.appendChild(topLine);

                    var botLine = document.createElement('div');
                    botLine.className = 'line';
                    botLine.style.width = '1px';
                    botLine.style.height = (cell * 4) + 'px';
                    botLine.style.left = xCoord + 'px';
                    botLine.style.top = (cell * 5) + 'px';
                    boardEl.appendChild(botLine);
                }
            }
            // --- Palace diagonals (Advisor path) ---
            var palaces = [
                { x1: 3, y1: 0, x2: 5, y2: 2 }, { x1: 5, y1: 0, x2: 3, y2: 2 }, // Top
                { x1: 3, y1: 7, x2: 5, y2: 9 }, { x1: 5, y1: 7, x2: 3, y2: 9 }  // Bottom
            ];
            for (var pIdx = 0; pIdx < palaces.length; pIdx++) {
                var p = palaces[pIdx];
                var dx = (p.x2 - p.x1) * cell;
                var dy = (p.y2 - p.y1) * cell;
                var len = Math.sqrt(dx * dx + dy * dy);
                var ang = Math.atan2(dy, dx) * 180 / Math.PI;

                var dLine = document.createElement('div');
                dLine.className = 'line';
                dLine.style.width = len + 'px';
                dLine.style.height = '1px';
                dLine.style.left = (p.x1 * cell) + 'px';
                dLine.style.top = (p.y1 * cell) + 'px';
                dLine.style.transformOrigin = '0 0';
                dLine.style.transform = 'rotate(' + ang + 'deg)';
                boardEl.appendChild(dLine);
            }

            // --- Last Move Trajectory (SVG Curved Arrow) ---
            if (lastMove) {
                var fx = isFlipped ? (8 - lastMove.fromX) : lastMove.fromX;
                var fy = isFlipped ? (9 - lastMove.fromY) : lastMove.fromY;
                var tx = isFlipped ? (8 - lastMove.toX) : lastMove.toX;
                var ty = isFlipped ? (9 - lastMove.toY) : lastMove.toY;
                var x1 = fx * cell, y1 = fy * cell;
                var x2 = tx * cell, y2 = ty * cell;
                var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
                var dist = Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
                if (dist > pieceSize) {
                    // Arrow: from origin CENTER, to destination piece EDGE
                    var r = pieceSize / 2 + 4;
                    var x2e = x2 - (x2 - x1) * (r / dist), y2e = y2 - (y2 - y1) * (r / dist);
                    var nx = (y1 - y2) / dist, ny = (x2 - x1) / dist;
                    var curve = dist * 0.15;
                    var cx = mx + nx * curve, cy = my + ny * curve;
                    var ns = "http://www.w3.org/2000/svg";
                    var svg = document.createElementNS(ns, "svg");
                    svg.setAttribute("style", "position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:90;");
                    var defs = document.createElementNS(ns, "defs");
                    var marker = document.createElementNS(ns, "marker");
                    marker.setAttribute("id", "arr");
                    marker.setAttribute("markerWidth", "10"); marker.setAttribute("markerHeight", "7");
                    marker.setAttribute("refX", "9"); marker.setAttribute("refY", "3.5");
                    marker.setAttribute("orient", "auto");
                    var aP = document.createElementNS(ns, "path"); aP.setAttribute("d", "M0,0 L0,7 L9,3.5 z"); aP.setAttribute("fill", "var(--text)");
                    marker.appendChild(aP); defs.appendChild(marker); svg.appendChild(defs);
                    var p = document.createElementNS(ns, "path");
                    p.setAttribute("d", "M " + x1 + " " + y1 + " Q " + cx + " " + cy + " " + x2e + " " + y2e);
                    p.setAttribute("stroke", "var(--text)"); p.setAttribute("stroke-width", "2");
                    p.setAttribute("stroke-dasharray", "6,4"); p.setAttribute("fill", "none");
                    p.setAttribute("marker-end", "url(#arr)");
                    svg.appendChild(p); boardEl.appendChild(svg);
                }
            }
            // --- Helper: draw markers (reinforcements) ---
            var drawMarker = function (mx, my) {
                var gap = Math.floor(cell * 0.1);
                var size = Math.floor(cell * 0.15);
                var configs = [
                    { dx: -1, dy: -1 }, { dx: 1, dy: -1 },
                    { dx: -1, dy: 1 }, { dx: 1, dy: 1 }
                ];
                for (var m = 0; m < configs.length; m++) {
                    var c = configs[m];
                    if (mx + c.dx < 0 || mx + c.dx > 8) continue;
                    var bx = mx * cell + c.dx * gap;
                    var by = my * cell + c.dy * gap;
                    var h = document.createElement('div');
                    h.className = 'line';
                    h.style.width = size + 'px';
                    h.style.height = '1px';
                    h.style.left = (c.dx > 0 ? bx : bx - size) + 'px';
                    h.style.top = by + 'px';
                    boardEl.appendChild(h);
                    var v = document.createElement('div');
                    v.className = 'line';
                    v.style.width = '1px';
                    v.style.height = size + 'px';
                    v.style.left = bx + 'px';
                    v.style.top = (c.dy > 0 ? by : by - size) + 'px';
                    boardEl.appendChild(v);
                }
            };
            drawMarker(1, 2); drawMarker(7, 2);
            drawMarker(1, 7); drawMarker(7, 7);
            for (var px = 0; px <= 8; px += 2) {
                drawMarker(px, 3);
                drawMarker(px, 6);
            }

            // --- River text ---
            var river = document.createElement('div');
            river.className = 'river';
            river.style.top = (cell * 4) + 'px';
            river.style.height = cell + 'px';
            river.style.fontSize = (cell * 0.4) + 'px';
            river.innerHTML = isFlipped ? '<span>漢 界</span><span>楚 河</span>' : '<span>楚 河</span><span>漢 界</span>';
            boardEl.appendChild(river);

            // --- Draw pieces and origin markers ---
            for (var y = 0; y < 10; y++) {
                for (var x = 0; x < 9; x++) {
                    var displayX = isFlipped ? (8 - x) : x;
                    var displayY = isFlipped ? (9 - y) : y;
                    var piece = board[y][x];

                    // Origin marker for last move (Dashed Circle)
                    if (lastMove && x === lastMove.fromX && y === lastMove.fromY) {
                        var om = document.createElement('div');
                        om.style.position = 'absolute';
                        om.style.width = Math.floor(cell * 0.5) + 'px';
                        om.style.height = Math.floor(cell * 0.5) + 'px';
                        om.style.border = '2px dashed #000';
                        om.style.borderRadius = '50%';
                        om.style.left = (displayX * cell - Math.floor(cell * 0.25)) + 'px';
                        om.style.top = (displayY * cell - Math.floor(cell * 0.25)) + 'px';
                        om.style.zIndex = '5';
                        boardEl.appendChild(om);
                    }

                    if (piece) {
                        var el = document.createElement('div');
                        el.className = 'cell ' + (piece === piece.toLowerCase() ? 'red' : 'black');
                        el.textContent = PIECES[piece] || piece;
                        el.style.width = pieceSize + 'px';
                        el.style.height = pieceSize + 'px';
                        el.style.fontSize = (pieceSize * 0.65) + 'px';
                        var displayX = isFlipped ? (8 - x) : x;
                        var displayY = isFlipped ? (9 - y) : y;
                        el.style.left = (displayX * cell - pieceSize / 2) + 'px';
                        el.style.top = (displayY * cell - pieceSize / 2) + 'px';

                        // Check indicator (💀)
                        if (piece.toLowerCase()[0] === 'k') {
                            var pColor = (piece === piece.toLowerCase() ? 'red' : 'black');
                            if (checkedColor === pColor) {
                                var s = document.createElement('div');
                                s.textContent = '💀';
                                s.style.position = 'absolute';
                                s.style.top = '-16px';
                                s.style.right = '-16px';
                                s.style.fontSize = '28px';
                                s.style.zIndex = '100';
                                el.appendChild(s);
                            }
                        }

                        // Last move indicator
                        if (lastMove && x === lastMove.toX && y === lastMove.toY) {
                            el.style.boxShadow = '0 0 15px var(--text)';
                        }

                        el.dataset.x = x;
                        el.dataset.y = y;
                        el.dataset.piece = piece;

                        if (selected && selected.x === x && selected.y === y) {
                            el.classList.add('selected');
                        }

                        (function (px, py, pPiece) {
                            el.onclick = function (e) {
                                e.stopPropagation();
                                onCellClick(px, py, pPiece);
                            };
                        })(x, y, piece);
                        boardEl.appendChild(el);
                    } else {
                        var elEmpty = document.createElement('div');
                        elEmpty.className = 'cell empty';
                        elEmpty.style.width = pieceSize + 'px';
                        elEmpty.style.height = pieceSize + 'px';
                        var displayXEmpty = isFlipped ? (8 - x) : x;
                        var displayYEmpty = isFlipped ? (9 - y) : y;
                        elEmpty.style.left = (displayXEmpty * cell - pieceSize / 2) + 'px';
                        elEmpty.style.top = (displayYEmpty * cell - pieceSize / 2) + 'px';
                        (function (px, py) {
                            elEmpty.onclick = function (e) {
                                e.stopPropagation();
                                onCellClick(px, py, null);
                            };
                        })(x, y);
                        boardEl.appendChild(elEmpty);
                    }
                }
            }

            var info = document.getElementById('turnInfo');
            if (isReplay) {
                info.textContent = '复盘模式';
                info.className = 'info';
                return;
            }
            if (currentTurn === myColor) {
                info.textContent = '你的回合';
            } else {
                info.textContent = (window.blackName === '电脑' && currentTurn === 'black') ? '电脑正在思考...' : '对方回合';
            }
            info.className = 'info ' + (currentTurn === 'red' ? 'red-turn' : 'black-turn');

            // 更新评估血条
            updateHealthDisplay();
        }

        function updateHealthDisplay() {
            if (!board || board.length === 0) return;
            var eval = window.evaluateBoardDetailed(board);

            // 胜负已分，败方归零 (复盘模式下只有最后一步才判定)
            var effectiveWinner = (isReplay && replayIndex < replayMoves.length) ? null : winner;
            if (effectiveWinner === 'red') eval.black = 0;
            if (effectiveWinner === 'black') eval.red = 0;

            // 将军状态检测
            var redInCheck = window.isCheck(board, 'red');
            var blackInCheck = window.isCheck(board, 'black');

            // 渲染逻辑：如果被将军，20% 的血量变成网纹
            var dangerZone = 20;

            var redMain = redInCheck ? Math.max(0, eval.red - dangerZone) : eval.red;
            var redDanger = redInCheck ? Math.min(eval.red, dangerZone) : 0;

            var blackMain = blackInCheck ? Math.max(0, eval.black - dangerZone) : eval.black;
            var blackDanger = blackInCheck ? Math.min(eval.black, dangerZone) : 0;

            document.getElementById('healthRedBar').style.width = redMain + '%';
            document.getElementById('healthRedDanger').style.width = redDanger + '%';

            document.getElementById('healthBlackBar').style.width = blackMain + '%';
            document.getElementById('healthBlackDanger').style.width = blackDanger + '%';

            document.getElementById('scoreRed').textContent = eval.red + '%';
            document.getElementById('scoreBlack').textContent = eval.black + '%';

            // 匕首图标
            document.getElementById('checkRed').style.display = redInCheck ? 'inline' : 'none';
            document.getElementById('checkBlack').style.display = blackInCheck ? 'inline' : 'none';

            // 记录历史
            scoreHistory.push({ move: lastMove, red: eval.red, black: eval.black, ts: Date.now() });
        }

        function onCellClick(x, y, piece) {
            if (isReplay) return;
            if (gameStatus === 'finished') return;
            if (currentTurn !== myColor) return;

            if (!selected) {
                if (!piece) return;
                var isRed = piece === piece.toLowerCase();
                if ((myColor === 'red' && !isRed) || (myColor === 'black' && isRed)) return;

                selected = { x: x, y: y };
                renderBoard();
            } else {
                if (piece) {
                    var isRed = piece === piece.toLowerCase();
                    if ((myColor === 'red' && isRed) || (myColor === 'black' && !isRed)) {
                        selected = { x: x, y: y };
                        renderBoard();
                        return;
                    }
                }

                fetch('/api/move', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({
                        roomCode: roomCode,
                        sessionId: sessionId,
                        fromX: selected.x,
                        fromY: selected.y,
                        toX: x,
                        toY: y,
                        piece: board[selected.y][selected.x]
                    })
                }).then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (data.success) {
                            selected = null;
                            // We no longer update board/turn here. 
                            // The WebSocket 'move' message will handle it for ALL players (including us)
                            // to ensure perfect synchronization and order.
                            if (data.status === 'finished') {
                                announceVictory(data.winner, data.victoryLine);
                            }
                        } else {
                            showFeedback('非法走法: ' + data.error);
                            selected = null;
                            // On error, we should probably sync board state just in case
                            restoreGame();
                        }
                    }).catch(function (err) {
                        showFeedback('走棋失败: ' + err.message);
                        selected = null;
                        renderBoard();
                    });
            }
        }

        var pendingUndoFrom = null;

        function undoMove() {
            fetch('/api/undo-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                body: JSON.stringify({ roomCode: roomCode })
            }).then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.success) {
                        showFeedback('已发送悔棋请求，等待对方同意...');
                        document.getElementById('undoBtn').disabled = true;
                    } else {
                        showFeedback(data.error || '悔棋失败');
                    }
                });
        }

        function showUndoBar(fromName) {
            document.getElementById('undoBarText').textContent = fromName + ' 请求悔棋';
            var bar = document.getElementById('undoBar');
            bar.style.display = 'flex';
        }

        function hideUndoBar() {
            document.getElementById('undoBar').style.display = 'none';
            pendingUndoFrom = null;
        }

        function acceptUndo() {
            fetch('/api/undo-accept', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                body: JSON.stringify({ roomCode: roomCode, requesterSession: pendingUndoFrom })
            });
            hideUndoBar();
        }

        function declineUndo() {
            // Notify requester via WS broadcast through a lightweight POST
            fetch('/api/undo-decline', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                body: JSON.stringify({ roomCode: roomCode })
            });
            hideUndoBar();
        }

        function updateNameDisplay() {
            document.getElementById('nameRed').textContent = window.redName || '无名氏';
            document.getElementById('nameBlack').textContent = window.blackName || '无名氏';

            // Update vs silhouettes
            if (window.redName) {
                const type = getArchetype(window.redName);
                document.getElementById('siloRed').innerHTML = SILHOUETTES[type] || '';
            }
            if (window.blackName) {
                const type = getArchetype(window.blackName);
                document.getElementById('siloBlack').innerHTML = SILHOUETTES[type] || '';
            }
        }

        function frontendIsCheck(color) {
            var kPos = null;
            var targetK = (color === 'red' ? 'k' : 'K');
            for (var r = 0; r < 10; r++) {
                for (var c = 0; c < 9; c++) {
                    if (board[r][c] && board[r][c][0] === targetK) { kPos = { x: c, y: r }; break; }
                }
            }
            if (!kPos) return false;
            // A simplified check: just enough to show the icon
            // We use the PIECES logic or similar. For performance in JS we'll just check if any opponent can move there.
            // But we already have the move logic in handleCellClick.
            // Let's implement a minimal version of validation here.
            return false; // Fallback for now, backend sends the flag usually
            return false;
        }

        var reconnectAttempts = 0;
        var maxReconnectAttempts = 10;

        function connectWS() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '?sessionId=' + sessionId + '&roomCode=' + roomCode);
            
            ws.onmessage = function (e) {
                var data = JSON.parse(e.data);
                if (data.type === 'move') {
                    lastMove = data.move;
                    board[data.move.toY][data.move.toX] = data.move.piece;
                    board[data.move.fromY][data.move.fromX] = null;
                    currentTurn = data.nextTurn;
                    gameStatus = data.status || 'playing';
                    winner = data.winner;
                    checkedColor = data.isCheck ? currentTurn : null;
                    renderBoard();
                    document.getElementById('undoBtn').disabled = false;
                    if (gameStatus === 'finished') {
                        announceVictory(data.winner, data.victoryLine);
                        document.getElementById('undoBtn').style.display = 'none';
                        document.getElementById('saveBtn').style.display = 'inline-block';
                    } else if (data.isCheck) {
                        showFeedback('将军！');
                    }

                    if (isAiRoom && currentTurn === 'black' && gameStatus === 'playing') {
                        triggerAiMove();
                    }
                } else if (data.type === 'undo') {
                    lastMove = null;
                    board = data.board;
                    currentTurn = data.currentTurn;
                    gameStatus = 'playing';
                    winner = null;
                    victoryAnnounced = false;
                    checkedColor = null;
                    selected = null;
                    document.getElementById('undoBtn').disabled = false;
                    renderBoard();
                    showFeedback('已悔棋');
                } else if (data.type === 'playerJoined' || data.type === 'playerReconnected') {
                    if (data.redName) window.redName = data.redName;
                    if (data.blackName) window.blackName = data.blackName;
                    updateNameDisplay();
                    if (data.who !== sessionId) {
                        // Suppress feedback for reconnections to reduce noise
                        if (data.type === 'playerJoined') {
                            showFeedback((myColor === 'red' ? (window.blackName || '对方') : (window.redName || '对方')) + ' 已加入');
                        } else {
                            console.log('Opponent reconnected');
                        }
                    }
                } else if (data.type === 'playerLeft') {
                    if (data.who !== sessionId) {
                        var leftName = (myColor === 'red' ? window.blackName : window.redName);
                        showFeedback((leftName || '对方') + ' 已离开');
                        if (myColor === 'red') window.blackName = '';
                        else window.redName = '';
                        updateNameDisplay();
                    }
                } else if (data.type === 'undoRequest') {
                    if (data.from !== sessionId) {
                        pendingUndoFrom = data.from;
                        showUndoBar(data.fromName || '对方');
                    }
                } else if (data.type === 'undoDeclined') {
                    if (data.to === sessionId) {
                        showFeedback('对方拒绝了悔棋请求');
                        document.getElementById('undoBtn').disabled = false;
                    }
                }
            };

            ws.onopen = function () { 
                console.log('WS Connected');
                if (reconnectAttempts > 0) {
                    // If we reconnected after a drop, sync state to catch up on missed moves
                    restoreGame();
                }
                reconnectAttempts = 0;
            };

            ws.onclose = function () {
                console.warn('WS Disconnected, attempting reconnect...');
                if (reconnectAttempts < maxReconnectAttempts && roomCode) {
                    var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
                    setTimeout(connectWS, delay);
                    reconnectAttempts++;
                }
            };

            ws.onerror = function (err) { 
                console.error('WS Error:', err);
                ws.close();
            };
        }

        window.onresize = function () {
            if (roomCode) renderBoard();
        };

        function refreshLobby() {
            fetch('/api/lobby').then(function (r) { return r.json(); })
                .then(function (data) {
                    var list = document.getElementById('roomList');
                    list.innerHTML = '';
                    if (data.rooms.length > 0) {
                        document.getElementById('lobbyContainer').style.display = 'block';
                        for (var i = 0; i < data.rooms.length; i++) {
                            var r = data.rooms[i];
                            var item = document.createElement('div');
                            item.className = 'room-item';
                            item.innerHTML = '<div style="display:flex;flex-direction:column;">' +
                                '<span class="rn">' + (r.room_name || '棋局') + '</span>' +
                                '<span class="own">' + (r.red_name || '无名氏') + ' 的房间</span>' +
                                '</div>' +
                                '<span style="font-size:12px; color:#333;">▶ 加入</span>';
                            // No code passed — user must enter it manually
                            item.onclick = function () {
                                document.getElementById('roomCodeInput').value = '';
                                document.getElementById('joinModal').classList.add('active');
                                document.getElementById('roomCodeInput').focus();
                            };
                            list.appendChild(item);
                        }
                    } else {
                        document.getElementById('lobbyContainer').style.display = 'none';
                    }
                });
        }

        function restoreGame() {
            var savedRoom = sessionStorage.getItem('xiangqi_room');
            if (savedRoom) {
                fetch('/api/sync/' + savedRoom, {
                    headers: { 'X-Session-Id': sessionId }
                }).then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (data.error) {
                            sessionStorage.removeItem('xiangqi_room');
                            return;
                        }
                        roomCode = savedRoom;
                        roomName = data.roomName;
                        board = data.board;
                        window.redName = data.redName;
                        window.blackName = data.blackName;
                        currentTurn = data.currentTurn;
                        myColor = data.myColor;
                        lastMove = data.lastMove;
                        isFlipped = (myColor === 'black');
                        gameStatus = data.status || 'playing';
                        winner = data.winner || null;
                        isAiRoom = data.isAi || false;
                        victoryAnnounced = false;

                        document.getElementById('roomNameDisplay').textContent = roomName;
                        document.getElementById('roomCodeText').textContent = roomCode;
                        document.getElementById('homePage').style.display = 'none';
                        document.getElementById('gameArea').style.display = 'flex';
                        document.getElementById('headerContent').style.display = 'flex';

                        // 与AI对战不需要显示房间信息
                        document.getElementById('roomMetaInfo').style.visibility = isAiRoom ? 'hidden' : 'visible';

                        updateNameDisplay();
                        renderBoard();
                        if (gameStatus === 'finished') {
                            announceVictory(data.winner, data.victoryLine);
                            document.getElementById('undoBtn').style.display = 'none';
                            if (!data.isSaved) {
                                document.getElementById('saveBtn').style.display = 'inline-block';
                            }
                        }
                        connectWS();
                    });
            }
        }

        window.onload = function () {
            if (roomCode) renderBoard();
            else {
                restoreGame();
                refreshLobby();
                setInterval(refreshLobby, 5000);
            }
        };

        function _sendAiMove(bestMove) {
            if (!bestMove) return;
            // Hide thinking indicator
            var ti = document.getElementById('turnInfo');
            if (ti) ti.textContent = ti._prevText || '';

            fetch('/api/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                body: JSON.stringify({
                    roomCode: roomCode,
                    sessionId: 'AI_BOT',
                    fromX: bestMove.fromX,
                    fromY: bestMove.fromY,
                    toX: bestMove.toX,
                    toY: bestMove.toY,
                    piece: bestMove.piece
                })
            }).then(function(r){ return r.json(); })
              .then(function(data){
                  if (!data.success) console.error('AI Move rejected:', data.error);
              }).catch(function(e){ console.error('AI move POST failed:', e); });
        }

        function triggerAiMove() {
            setTimeout(function () {
                if (currentTurn !== 'black' || gameStatus !== 'playing') return;

                // Show thinking indicator
                var ti = document.getElementById('turnInfo');
                if (ti) { ti._prevText = ti.textContent; ti.textContent = '思考中...'; }

                // Deep-copy board so AI can mutate it freely without affecting display
                var boardCopy = board.map(function(row){ return row.slice(); });

                if (aiWorkerReady && aiWorker) {
                    // Non-blocking: send to Worker
                    aiWorker.onmessage = function(e) { _sendAiMove(e.data.move); };
                    aiWorker.onerror   = function(err) {
                        console.warn('Worker error, falling back:', err);
                        aiWorkerReady = false;
                        var mv = window.getBestMove(boardCopy, 'black', aiLevel, window.validateMove);
                        _sendAiMove(mv);
                    };
                    aiWorker.postMessage({ board: boardCopy, color: 'black', level: aiLevel });
                } else {
                    // Fallback: main-thread (may briefly freeze for high levels)
                    setTimeout(function() {
                        var mv = window.getBestMove(boardCopy, 'black', aiLevel, window.validateMove);
                        _sendAiMove(mv);
                    }, 0);
                }
            }, 400);
        }
    </script>
